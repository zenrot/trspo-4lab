services:
  labserver:
    image: trspo-labserver:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Server/Dockerfile
    restart: unless-stopped
    user: root
    env_file:
      - .env
    volumes:
      - './Server/appsettings.docker.json:/app/appsettings.json:ro'
      - '../:/plagiarism/seed:ro'
      - 'plagiarism-learning:/plagiarism/learned'
    depends_on:
      - db
      - plagiarism-server
      - ollama
    environment:
      DisableBackgroundServices: ${DISABLE_BACKGROUND_SERVICES:-false}
      Plagiarism__Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Plagiarism__LearningDirectory: /plagiarism/learned
      Plagiarism__ReferenceDirectory: /plagiarism/seed
      Database__EnsureCreatedOnStartup: ${DATABASE_ENSURE_CREATED_ON_STARTUP:-true}
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  plagiarism-server:
    image: trspo-labserver:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Server/Dockerfile
    restart: unless-stopped
    user: root
    ports:
      - "${PLAGIARISM_PORT:-15289}:5288"
    env_file:
      - .env
    volumes:
      - './Server/appsettings.docker.json:/app/appsettings.json:ro'
      - '../:/plagiarism/seed:ro'
      - 'plagiarism-learning:/plagiarism/learned'
    depends_on:
      - db
      - ollama
    environment:
      DisableBackgroundServices: "true"
      Plagiarism__Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://ollama:11434}
      Plagiarism__LearningDirectory: /plagiarism/learned
      Plagiarism__ReferenceDirectory: /plagiarism/seed
      Database__EnsureCreatedOnStartup: ${DATABASE_ENSURE_CREATED_ON_STARTUP:-true}
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /usr/share/ollama/.ollama/models
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  webserver:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - labserver
      - gitlab
    ports:
      - "${ADMIN_PORT:-18080}:8080"
      - "${DASHBOARD_PORT:-18081}:8081"
      - "${GITLAB_HTTP_PORT:-18082}:8082"
    volumes:
      - ./nginx/conf/app.conf.deploy:/etc/nginx/conf.d/default.conf:ro
      - ./web/admin/dist/admin:/var/www/sites/admin:ro
      - ./web/dashboard/dist/dashboard:/var/www/sites/dashboard:ro
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-18083}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  db:
    image: postgres:16
    restart: unless-stopped
    shm_size: 128m
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-labs}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: trspo-gitlab
    restart: unless-stopped
    hostname: ${PUBLIC_HOST:-zenrot.root.sx}
    shm_size: '256m'
    ports:
      - "${GITLAB_SSH_PORT:-18022}:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${PUBLIC_HOST:-zenrot.root.sx}:${GITLAB_HTTP_PORT:-18082}'
        nginx['redirect_http_to_https'] = false
        letsencrypt['enable'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-18022}
    volumes:
      - '${LABSERVER_DATA_DIR:-/home/alexey/trspo-3lab/data}/gitlab/config:/etc/gitlab'
      - '${LABSERVER_DATA_DIR:-/home/alexey/trspo-3lab/data}/gitlab/logs:/var/log/gitlab'
      - '${LABSERVER_DATA_DIR:-/home/alexey/trspo-3lab/data}/gitlab/data:/var/opt/gitlab'
    logging:
      driver: "json-file"
      options:
        max-size: "512k"
        max-file: 16

  admin-builder:
    image: node:22-bookworm
    profiles:
      - build
    working_dir: /src/web/admin
    volumes:
      - .:/src
    command: /bin/sh -lc "npm ci && npx ng build --configuration production --output-path dist/admin"

  dashboard-builder:
    image: node:22-bookworm
    profiles:
      - build
    working_dir: /src/web/dashboard
    volumes:
      - .:/src
    command: /bin/sh -lc "npm ci && npx ng build --configuration production --output-path dist/dashboard"

volumes:
  postgres-data:
  plagiarism-learning:
