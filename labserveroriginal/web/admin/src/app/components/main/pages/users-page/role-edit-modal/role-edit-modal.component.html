<div class="modal-header">
    <h4 class="modal-title pull-left">{{ 'usersEditRoleModalTitle' | translate: {user: email} }}</h4>
    <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="bsModalRef.hide()">
        <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
</div>
<div class="modal-body">
    @for (availableRole of userService.getAllRoles(); track availableRole)
    {
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="{{ 'checkRole' + availableRole }}"
                [checked]="roles?.includes(availableRole)"
                (change)="toggleRole(availableRole)">
            <label class="form-check-label" for="{{ 'checkRole' + availableRole }}">
                <app-role-bage [role]="availableRole"></app-role-bage>
            </label>
        </div>
    }
</div>
<div class="modal-footer">
    <button type="button" 
            class="btn btn-primary" 
            [ngClass]="{'disabled': !rolesChanged()}"
            (click)="apply()">
        {{ 'usersEditRoleModalApply' | translate }}
    </button>
</div>
