<div class="container-fluid">
    <div class="row flex-nowrap">
        <div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0 bg-dark">
            <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-2 text-white min-vh-100">
                <a class="d-flex align-items-center pb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                    <span class="fs-5 d-none d-sm-inline">{{ 'sidebarTitle' | translate }} <i class="fs-4 bi-rocket-takeoff"></i></span>
                </a>
                <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start" id="menu">
                    <li authorized [roles]="['Professor']">
                        <a class="nav-link px-0 align-middle" routerLink="/courses">
                            <i class="fs-4 bi-table"></i> <span class="ms-1 d-none d-sm-inline">{{ 'sidebarCoursesLink' | translate }}</span>
                        </a>
                    </li>
                    <li authorized [roles]="['Professor', 'Assistant']">
                        <a class="nav-link px-0 align-middle" routerLink="/groups">
                            <i class="fs-4 bi-people"></i> <span class="ms-1 d-none d-sm-inline">{{ 'sidebarGroupsLink' | translate }}</span>
                        </a>
                    </li>
                    <li authorized [roles]="['Professor', 'Assistant']">
                        <a class="nav-link px-0 align-middle" routerLink="/tests">
                            <i class="fs-4 bi-speedometer2"></i> <span class="ms-1 d-none d-sm-inline">{{ 'sidebarTestsLink' | translate }}</span>
                        </a>
                    </li>
                    <li authorized [roles]="['Administrator']">
                        <a class="nav-link px-0 align-middle" routerLink="/users">
                            <i class="fs-4 bi-file-person"></i> <span class="ms-1 d-none d-sm-inline">{{ 'sidebarUsersLink' | translate }}</span>
                        </a>
                    </li>
                </ul>
                <hr>
                <div class="pb-4">
                    <app-account-menu></app-account-menu>
                </div>
            </div>
        </div>
        <div class="col py-3">
            <div class="d-flex justify-content-center mb-3">
                <div class="page-container">
                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
    </div>
</div>
